name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  check:
    name: Pre-deploy Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-frontend:
    name: Deploy Frontend
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      # Vercel 部署 (需要在 repo settings 添加 VERCEL_TOKEN)
      # 取消注释以下步骤启用自动部署
      # - uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     vercel-args: --prod
      #     working-directory: frontend
      - run: echo "Frontend build ready. Configure Vercel secrets to enable auto-deploy."

  deploy-backend:
    name: Deploy Backend
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      # Railway/Fly.io 部署 (需要添加对应 secrets)
      # 取消注释以下步骤启用自动部署
      # - uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: echo "Backend build ready. Configure deployment secrets to enable auto-deploy."
